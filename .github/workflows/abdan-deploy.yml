name: Deploy Design Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: design-test-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy through WireGuard
    environment: dev
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install WireGuard and SSH
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            wireguard-tools \
            openssh-client

      - name: Start WireGuard
        env:
          WG_CONF: ${{ secrets.WG_CONF }}
        run: |
          set -euo pipefail

          if [ -z "$WG_CONF" ]; then
            echo "WG_CONF secret is empty"
            exit 1
          fi

          sudo install -d -m 700 /etc/wireguard

          # Remove DNS entries because the runner does not need
          # WireGuard DNS to SSH to a private IP address.
          printf '%s\n' "$WG_CONF" \
            | sed -E '/^[[:space:]]*DNS[[:space:]]*=/d' \
            | sudo tee /etc/wireguard/wg0.conf > /dev/null

          sudo chmod 600 /etc/wireguard/wg0.conf

          sudo wg-quick up wg0
          sudo wg show wg0

      - name: Configure SSH
        env:
          DESIGN_TEST_SSH_KEY: ${{ secrets.DESIGN_TEST_SSH_KEY }}
          DESIGN_TEST_HOST: ${{ secrets.DESIGN_TEST_HOST }}
          DESIGN_TEST_PORT: ${{ secrets.DESIGN_TEST_PORT || '22' }}
        run: |
          set -euo pipefail

          if [ -z "$DESIGN_TEST_SSH_KEY" ]; then
            echo "DESIGN_TEST_SSH_KEY secret is empty"
            exit 1
          fi

          if [ -z "$DESIGN_TEST_HOST" ]; then
            echo "DESIGN_TEST_HOST secret is empty"
            exit 1
          fi

          install -d -m 700 "$HOME/.ssh"

          printf '%s\n' "$DESIGN_TEST_SSH_KEY" \
            > "$HOME/.ssh/deploy_key"

          chmod 600 "$HOME/.ssh/deploy_key"

          : > "$HOME/.ssh/known_hosts"

          for attempt in {1..10}; do
            echo "SSH connection check: attempt $attempt"

            ssh-keyscan \
              -T 10 \
              -p "$DESIGN_TEST_PORT" \
              -H "$DESIGN_TEST_HOST" \
              >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

            if [ -s "$HOME/.ssh/known_hosts" ]; then
              break
            fi

            sleep 3
          done

          if [ ! -s "$HOME/.ssh/known_hosts" ]; then
            echo "Could not reach $DESIGN_TEST_HOST:$DESIGN_TEST_PORT through WireGuard"
            exit 1
          fi

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy
        env:
          DESIGN_TEST_HOST: ${{ secrets.DESIGN_TEST_HOST }}
          DESIGN_TEST_USER: ${{ secrets.DESIGN_TEST_USER }}
          DESIGN_TEST_PORT: ${{ secrets.DESIGN_TEST_PORT || '22' }}
        run: |
          set -euo pipefail

          if [ -z "$DESIGN_TEST_USER" ]; then
            echo "DESIGN_TEST_USER secret is empty"
            exit 1
          fi

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DESIGN_TEST_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$DESIGN_TEST_USER@$DESIGN_TEST_HOST" \
            'set -eu
             cd /opt/design-test-nbs
             git checkout main
             git pull --ff-only origin main'

      - name: Clean up
        if: always()
        run: |
          sudo wg-quick down wg0 || true
          sudo rm -f /etc/wireguard/wg0.conf
          rm -f "$HOME/.ssh/deploy_key"
          rm -f "$HOME/.ssh/known_hosts"
