<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Analyser — Site Characterisation: People Context (ASEAN)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* NbS Tool v3 design system tokens (design-system.html · Foundation) */
  :root{
    --text-main:#252525; --text-second:#68727d; --text-third:#c0c2c6;
    --stroke-base:#eaecf0; --bg-base-main:#ffffff; --bg-base-second:#fafbfc; --bg-base-third:#f7f7f8;
    --primary-600:#066653; --primary-500:#077f68; --primary-700:#044c3e;
    --font-display:'Barlow Semi Condensed', sans-serif;
    --font-ui:'Poppins', sans-serif;
    --radius-lg:8px; --radius-md:6px; --radius-sm:4px; --radius-xl:12px;
    --elev-2:0px 1px 3px 0px rgba(0,0,0,.08); --elev-4:0px 4px 12px 0px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-ui); color:var(--text-main); background:#e9edf0; padding:40px 24px; display:flex; justify-content:center; -webkit-font-smoothing:antialiased;}
  .da-panel{width:810px; background:var(--bg-base-main); border-radius:var(--radius-xl); overflow:hidden; box-shadow:var(--elev-4); display:flex; flex-direction:column;}
  .da-head{background:var(--primary-600); color:#fff;}
  .da-head-top{display:flex; align-items:center; justify-content:space-between; padding:20px 20px 0 20px;}
  .da-head-top h1{font-weight:600; font-size:20px; line-height:28px;}
  .country-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:4px 8px 4px 12px;font-size:12px;font-weight:600;}
  .country-pill select{background:transparent;border:none;color:#fff;font-family:var(--font-ui);font-weight:600;font-size:12px;outline:none;cursor:pointer;}
  .country-pill select option{color:var(--text-main);}
  .stepper{display:flex; align-items:center; gap:8px; padding:16px 20px 18px 20px;}
  .step{display:flex; align-items:center; gap:8px; font-size:12px; font-weight:500; color:rgba(255,255,255,.6); white-space:nowrap;}
  .step .n{width:22px; height:22px; border-radius:50%; display:grid; place-items:center; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,.4); color:rgba(255,255,255,.7);}
  .step.done .n,.step.current .n{background:#fff; color:var(--primary-700); border-color:#fff;}
  .step.done,.step.current{color:#fff;}
  .step-div{flex:1; height:1px; background:rgba(255,255,255,.35); min-width:12px;}
  .da-tabs{display:flex; gap:24px; padding:0 20px; background:var(--bg-base-main); border-bottom:1px solid var(--stroke-base);}
  .da-tab{padding:14px 0; font-size:14px; font-weight:500; color:var(--text-second); cursor:pointer; border-bottom:2px solid transparent;}
  .da-tab.active{color:var(--primary-600); border-bottom-color:var(--primary-600); font-weight:600;}
  .da-body{padding:20px; display:flex; flex-direction:column; gap:18px;}
  .da-section-title{text-align:center; font-family:var(--font-display); font-weight:600; font-size:24px; line-height:30px; letter-spacing:-.5px; padding:4px 0 0;}
  .da-section-title .rule{display:block; width:120px; height:3px; margin:8px auto 0; background:linear-gradient(90deg,#066653,#564efa,#c96432); border-radius:2px;}
  .sect{border:1px solid var(--stroke-base); border-left:4px solid var(--accent); border-radius:var(--radius-lg); background:var(--bg-base-main); padding:18px 18px 16px;}
  .sect-header{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .sect-header .chip{width:26px;height:26px;border-radius:7px;background:var(--accent-soft);color:var(--accent-deep);display:grid;place-items:center;}
  .sect-header .chip svg{width:15px;height:15px;fill:currentColor;}
  .sect-header .eyebrow{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--accent-deep);}
  .sect-header .info-dot{margin-left:auto;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:700;font-style:italic;cursor:default;}
  .narrative{font-size:13.5px; line-height:21px; color:var(--text-main); margin-bottom:16px;}
  .narrative b{font-weight:600; color:var(--accent-deep);}
  .grid1{display:grid; grid-template-columns:1fr; gap:12px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  .grid4{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;}
  [data-tip]{cursor:pointer;}
  svg [data-tip]:hover{opacity:.72;}
  .chart-tip{position:fixed; z-index:99; background:var(--text-main); color:#fff; font-size:11px; font-weight:500; padding:4px 9px; border-radius:6px; pointer-events:none; opacity:0; transition:opacity .12s; white-space:nowrap; box-shadow:var(--elev-2);}
  .block{margin-top:14px;}
  .blk-head{margin-bottom:9px;}
  .blk-head .t{font-size:13px; font-weight:600; line-height:18px; color:var(--text-main); display:flex; align-items:center; gap:7px;}
  .blk-head .t::before{content:""; width:3px; height:14px; border-radius:2px; background:var(--accent); flex-shrink:0;}
  .blk-head .s{font-size:10.5px; line-height:15px; color:var(--text-second); margin-top:2px; padding-left:10px;}
  .pct{border:1px solid var(--accent-soft); background:var(--accent-soft); border-radius:var(--radius-lg); padding:11px 9px; text-align:center; display:flex; flex-direction:column; gap:2px; justify-content:center;}
  .pct .label{font-size:11px; font-weight:500; color:var(--text-main); line-height:14px;}
  .pct .val{font-family:var(--font-display); font-weight:700; font-size:24px; line-height:26px; color:var(--accent-deep);}
  .pct .sub{font-size:9.5px; color:var(--text-second);}
  .kpi{border:1px solid var(--accent); background:linear-gradient(180deg,var(--accent-soft),#fff 70%); border-radius:var(--radius-lg); padding:11px 12px; display:flex; align-items:center; gap:11px;}
  .kpi .ic{width:36px;height:36px;border-radius:9px;background:#fff;border:1px solid var(--accent-soft);color:var(--accent-deep);display:grid;place-items:center;flex-shrink:0;}
  .kpi .ic svg{width:19px;height:19px;fill:currentColor;}
  .kpi .meta{min-width:0;}
  .kpi .label{font-size:10.5px; color:var(--text-second); line-height:13px;}
  .kpi .val{font-family:var(--font-display); font-weight:700; font-size:20px; line-height:23px; letter-spacing:-.3px; color:var(--accent-deep);}
  .kpi .sub{font-size:9.5px; color:var(--text-third); line-height:12px;}
  .paired{display:flex; border:1px solid var(--stroke-base); border-radius:var(--radius-md); overflow:hidden;}
  .paired .half{flex:1; padding:9px; text-align:center; display:flex; flex-direction:column; gap:1px;}
  .paired .half:first-child{border-right:1px solid var(--stroke-base); background:var(--accent-soft);}
  .paired .half .label{font-size:10px; color:var(--text-second);}
  .paired .half .val{font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--accent-deep);}
  .pct .ic{color:var(--accent-deep); opacity:.85; align-self:center;}
  .pct .ic svg{width:15px;height:15px;fill:currentColor;display:block;margin:0 auto 2px;}
  .dcard{border:1px solid var(--stroke-base); border-radius:var(--radius-lg); background:var(--bg-base-main); padding:11px 12px; display:flex; flex-direction:column;}
  .dc-t{font-size:12px; font-weight:600; line-height:16px; color:var(--text-main); display:flex; align-items:center; gap:7px;}
  .dc-t .ti{width:20px;height:20px;border-radius:6px;background:var(--accent-soft);color:var(--accent-deep);display:grid;place-items:center;flex-shrink:0;}
  .dc-t .ti svg{width:12px;height:12px;fill:currentColor;}
  .dc-u{font-size:10px; color:var(--text-second); margin:2px 0 0 27px;}
  .dc-body{flex:1; display:flex; flex-direction:column; justify-content:center; margin:8px 0 6px;}
  .dc-src{font-size:9.5px; line-height:13px; color:var(--text-third); border-top:1px dashed var(--stroke-base); padding-top:5px; margin-top:auto;}
  .ranked{display:flex; flex-direction:column; gap:6px;}
  .rank{display:flex; align-items:center; gap:9px; padding:7px 9px; border:1px solid var(--stroke-base); border-radius:var(--radius-md); background:var(--bg-base-second);}
  .rank .num{width:19px;height:19px;border-radius:5px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;font-size:10.5px;flex-shrink:0;}
  .rank .nm{flex:1; font-size:12px; font-weight:500; color:var(--text-main); line-height:15px;}
  .rank .v{font-size:11.5px; font-weight:600; color:var(--text-second);}
  .tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:999px;white-space:nowrap;}
  .tag.cont{background:#fce8ec;color:#a32f44;}
  .tag.non{background:#e3f3ee;color:#055143;}
  .legend{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:8px;}
  .lg{display:flex; align-items:center; gap:5px; font-size:10.5px; font-weight:500; color:var(--text-second);}
  .lg .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .donut-wrap{display:flex; align-items:center; gap:14px;}
  .donut-lg{display:flex; flex-direction:column; gap:5px; flex:1; min-width:0;}
  .dl{display:flex; align-items:center; gap:7px; font-size:11px;}
  .dl .sw{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
  .dl .nm{flex:1; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .dl .pc{font-weight:600; color:var(--text-second);}
  .picto-row{display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px dashed var(--stroke-base);}
  .picto-row:last-child{border-bottom:none;} .picto-row:first-child{padding-top:2px;}
  .picto-row .picon{width:28px;height:28px;border-radius:7px;background:var(--accent-soft);color:var(--accent-deep);display:grid;place-items:center;flex-shrink:0;}
  .picto-row .picon svg{width:15px;height:15px;fill:currentColor;}
  .picto-row .pmeta{flex:1; min-width:0; display:flex; flex-direction:column; gap:3px;}
  .picto-row .nm{font-size:11px; font-weight:500; color:var(--text-main); line-height:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .picto-row .pc{font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--accent-deep); flex-shrink:0;}
  .picto-row .dots{display:flex; gap:2.5px;}
  .picto-row .dot{width:8px;height:8px;border-radius:2px;background:rgba(0,0,0,.07);}
  .picto-row .dot.on{background:var(--accent);}
  .pyr-foot{display:flex; margin-top:2px; font-size:11px; font-weight:600; color:var(--accent-deep);}
  .pyr-foot .l{flex:1;} .pyr-foot .r{flex:1; text-align:right;}
  .vcard{border:1px solid var(--stroke-base); border-radius:var(--radius-lg); background:var(--bg-base-second); padding:12px 13px;}
  .vcard .vt{font-size:12px; font-weight:600; color:var(--text-main); margin-bottom:3px;}
  .vcard .vd{font-size:10.5px; line-height:15px; color:var(--text-second); margin-bottom:26px;}
  .gauge{position:relative; height:10px; border-radius:6px; background:linear-gradient(90deg,#077f68,#8fd14f,#f4d03f,#eb984e,#e0556b);}
  .gauge .mk{position:absolute; top:-4px; width:3px; height:18px; background:var(--text-main); border-radius:2px; transform:translateX(-50%);}
  .gauge .gl{position:absolute; top:-24px; transform:translateX(-50%); background:var(--text-main); color:#fff; font-size:9.5px; font-weight:600; padding:1px 7px; border-radius:5px; white-space:nowrap;}
  .gscale{display:flex; justify-content:space-between; font-size:9.5px; color:var(--text-third); margin-top:4px;}
  .vcard .vs{font-size:9.5px; color:var(--text-third); margin-top:8px;}
  .src{font-size:10.5px; color:var(--text-second); margin-top:14px;}
  .da-foot{display:flex; gap:12px; padding:12px 20px; border-top:1px solid var(--stroke-base);}
  .btn{flex:1; height:40px; border-radius:var(--radius-md); font-size:14px; font-weight:600; font-family:var(--font-ui); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px;}
  .btn-secondary{background:#fff; color:var(--primary-600); border:1px solid var(--primary-600);}
  .btn-primary{background:var(--primary-600); color:#fff; border:1px solid var(--primary-600);}
  .theme-demography{--accent:#077f68; --accent-soft:#e3f3ee; --accent-deep:#055143;}
  .theme-employment{--accent:#564efa; --accent-soft:#ecebff; --accent-deep:#3b34c4;}
  .theme-education{--accent:#2f72e0; --accent-soft:#e6effc; --accent-deep:#1c4f9e;}
  .theme-economy{--accent:#e08a1e; --accent-soft:#fdf2dd; --accent-deep:#9c5d12;}
  .theme-health{--accent:#e0556b; --accent-soft:#fce8ec; --accent-deep:#a32f44;}
  .theme-housing{--accent:#1796a3; --accent-soft:#e0f3f5; --accent-deep:#0d6670;}
</style>
</head>

const SECT_IC={demography:'people',employment:'brief',education:'grad',economy:'cash',health:'heart',housing:'house'};
function icv(k){return `<svg viewBox="0 0 16 16">${IX[k]||IX.people}</svg>`;}
function iconFor(t,key){t=t.toLowerCase();
 if(t.includes('income'))return 'cash';
 if(t.includes('households')&&t.includes('number'))return 'house';
 if(t.includes('educated')||t.includes('literacy'))return 'book';
 if(t.includes('students'))return 'grad';
 if(t.includes('gini')||t.includes('inequality')||t.includes('industries')||t.includes('sector'))return 'graph';
 if(t.includes('health facilities'))return 'hospital';
 if(t.includes('disability'))return 'badge';
 if(t.includes('stunting')||t.includes('diseases'))return 'heart';
 if(t.includes('wastewater'))return 'trash';
 if(t.includes('toilet'))return 'bucket';
 if(t.includes('water'))return 'droplet';
 if(t.includes('house types'))return 'house';
 if(t.includes('forest'))return 'tree';
 if(t.includes('unemployment')||t.includes('underemployment'))return 'brief';
 if(t.includes('employment'))return 'personplus';
 if(t.includes('population'))return 'people';
 return SECT_IC[key]||'people';}
function waterIcon(n){n=n.toLowerCase();
 if(/refill|bottle|newater|desalinat/.test(n))return 'bottle';
 if(/well|spring|rain|catchment/.test(n))return 'well';
 if(/bore|tube|pump/.test(n))return 'bucket';
 return 'droplet';}
function esc(s){return String(s||'').replace(/"/g,'&quot;');}
function yearLabels(unit,n){const m=/(\d{4})\s*[–-]\s*(\d{4})/.exec(unit||'');
 return Array.from({length:n},(_,i)=>m?String(+m[2]-n+1+i):'');}

/* ============ svg chart builders (hover → tooltip via data-tip) ============ */
function svgDonut(segs,colors,unit){const size=116,tot=segs.reduce((a,s)=>a+s.v,0)||1;
 const R=size*.42,r=size*.26,cx=size/2,cy=size/2;let a=-Math.PI/2,p='';
 segs.forEach((s,i)=>{const ang=Math.min(s.v/tot*2*Math.PI,2*Math.PI-.0001),a2=a+ang,big=ang>Math.PI?1:0;
  const x1=cx+R*Math.cos(a),y1=cy+R*Math.sin(a),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
  const xi1=cx+r*Math.cos(a),yi1=cy+r*Math.sin(a),xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2);
  p+=`<path data-tip="${esc(s.n)}: ${s.v}%" d="M${x1} ${y1} A${R} ${R} 0 ${big} 1 ${x2} ${y2} L${xi2} ${yi2} A${r} ${r} 0 ${big} 0 ${xi1} ${yi1} Z" fill="${colors[i%colors.length]}"/>`;a=a2;});
 return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="flex-shrink:0">${p}</svg>`;}
function svgLine(pts,color,soft,labels){const W=270,H=88,pad=8,mn=Math.min(...pts),mx=Math.max(...pts);
 const xy=pts.map((v,i)=>[pad+i/(pts.length-1)*(W-2*pad),H-pad-((v-mn)/((mx-mn)||1))*(H-2*pad-8)]);
 const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 return `<svg viewBox="0 0 ${W} ${H}" width="100%"><path d="${d} L${W-pad} ${H-pad} L${pad} ${H-pad} Z" fill="${soft}"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>${xy.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="${color}"/><circle data-tip="${esc(labels&&labels[i]?labels[i]+': ':'')}${pts[i]}" cx="${p[0]}" cy="${p[1]}" r="8" fill="transparent"/>`).join('')}</svg>`;}
function svgBars(items,color,deep,unit){const n=items.length,W=Math.max(220,n*56),cw=W/n,bw=Math.min(34,cw*.5);let s='';
 const max=Math.max(...items.map(i=>i.v))||1;
 items.forEach((it,i)=>{const h=(it.v/max)*80,x=i*cw+(cw-bw)/2,y=98-h;
  s+=`<rect data-tip="${esc(it.n)}: ${it.v}${it.suf||''}" x="${x}" y="${y}" width="${bw}" height="${h}" rx="3" fill="${i===0?deep:color}"/><text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="9" font-weight="700" fill="#252525">${it.v}${it.suf||''}</text><text x="${x+bw/2}" y="112" text-anchor="middle" font-size="7.5" fill="#68727d">${it.n}</text>`;});
 return `<svg viewBox="0 0 ${W} 118" width="100%">${s}</svg>`;}
function svgStack(segs,colors){let x=0,s='';const tot=segs.reduce((a,g)=>a+g.v,0)||1;
 segs.forEach((g,i)=>{const w=g.v/tot*100;s+=`<rect data-tip="${esc(g.n)}: ${g.v}%" x="${x}" y="0" width="${w}" height="26" fill="${colors[i%colors.length]}"/>${w>7?`<text x="${x+w/2}" y="17" text-anchor="middle" font-size="9" font-weight="600" fill="#fff" pointer-events="none">${Math.round(w)}%</text>`:''}`;x+=w;});
 return `<svg viewBox="0 0 100 26" width="100%" height="26" preserveAspectRatio="none" style="border-radius:5px">${s}</svg>`;}
function svgPyramid(rows){const W=300,H=196,cx=W/2,gap=20,bh=H/rows.length-2;
 const band=a=>{const n=parseInt(a);return n>=45?'#044c3e':n>=15?'#077f68':'#9ed8cb';};let s='';
 const max=Math.max(...rows.flatMap(r=>[r.m,r.f]))||1;
 rows.forEach((r,i)=>{const y=i*(bh+2),lw=r.m/max*(cx-gap-4),rw=r.f/max*(cx-gap-4);
  const tip=`Age ${r.a} — Male ${r.m}% · Female ${r.f}%`;
  s+=`<rect data-tip="${tip}" x="${cx-gap-lw}" y="${y}" width="${lw}" height="${bh}" rx="1.5" fill="${band(r.a)}"/><rect data-tip="${tip}" x="${cx+gap}" y="${y}" width="${rw}" height="${bh}" rx="1.5" fill="${band(r.a)}" opacity=".62"/><text x="${cx}" y="${y+bh-1.5}" text-anchor="middle" font-size="7" fill="#68727d">${r.a}</text>`;});
 return `<svg viewBox="0 0 ${W} ${H}" width="100%">${s}</svg>`;}
function gauge(level,tipTxt){const pos={'Very Low':8,'Low':28,'Moderate':50,'High':72,'Very High':92}[level]??50;
 return `<div class="gauge" data-tip="${esc(tipTxt||level)}"><span class="gl" style="left:${pos}%">${level}</span><span class="mk" style="left:${pos}%"></span></div><div class="gscale"><span>Very Low</span><span>Very High</span></div>`;}
function dots(pct){const on=Math.round(pct/5);let s='';for(let i=0;i<20;i++)s+=`<span class="dot${i<on?' on':''}"></span>`;return s;}

/* ============ card factory ============ */
function card(key,c){
 const sh=SHADES[key]||SHADES.demography;
 const ic=c.ic||iconFor(c.t,key);
 if(c.viz==='pct')return `<div class="pct" data-tip="${esc(c.src)}"><span class="ic">${icv(ic)}</span><span class="label">${c.t}</span><span class="val">${c.value}</span>${c.unit?`<span class="sub">${c.unit}</span>`:''}</div>`;
 if(c.viz==='kpi')return `<div class="kpi" data-tip="${esc(c.src)}"><span class="ic">${icv(ic)}</span><div class="meta"><div class="label">${c.t}</div><div class="val">${c.value}</div>${c.unit?`<div class="sub">${c.unit}</div>`:''}</div></div>`;
 let body='';
 switch(c.viz){
  case 'ranked': body=`<div class="ranked">${c.items.map((it,i)=>`<div class="rank" data-tip="${esc(it.n)}${it.v?': '+esc(it.v):''}"><span class="num">${i+1}</span><span class="nm">${it.n}</span>${it.tag?`<span class="tag ${it.tag}">${it.tag==='cont'?'Contagious':'Non-contagious'}</span>`:`<span class="v">${it.v||''}</span>`}</div>`).join('')}</div>`;break;
  case 'stacked': body=`${svgStack(c.segs,sh)}<div class="legend">${c.segs.map((g,i)=>`<span class="lg"><span class="sw" style="background:${sh[i%sh.length]}"></span>${g.n}</span>`).join('')}</div>`;break;
  case 'donut': body=`<div class="donut-wrap">${svgDonut(c.segs,sh)}<div class="donut-lg">${c.segs.map((g,i)=>`<div class="dl"><span class="sw" style="background:${sh[i%sh.length]}"></span><span class="nm">${g.n}</span><span class="pc">${g.v}%</span></div>`).join('')}</div></div>`;break;
  case 'line': body=svgLine(c.pts,sh[1],sh[4],yearLabels(c.unit,c.pts.length));break;
  case 'bars': body=svgBars(c.items,sh[1],sh[0]);break;
  case 'picto': body=c.items.map(it=>`<div class="picto-row" data-tip="${esc(it.n)}: ${it.v}% of households"><span class="picon">${icv(waterIcon(it.n))}</span><div class="pmeta"><span class="nm">${it.n}</span><div class="dots">${dots(it.v)}</div></div><span class="pc">${it.v}%</span></div>`).join('');break;
 }
 return `<div class="dcard"><div class="dc-t"><span class="ti">${icv(ic)}</span>${c.t}</div>${c.unit?`<div class="dc-u">${c.unit}</div>`:''}<div class="dc-body">${body}</div><div class="dc-src">${c.src}</div></div>`;
}
function section(key,narr,cards,cols,srcLine){const s=SECT[key];
 let stats=cards.filter(c=>c.viz==='pct'||c.viz==='kpi');
 let charts=cards.filter(c=>c.viz!=='pct'&&c.viz!=='kpi');
 if(stats.length===1&&charts.length){charts=stats.concat(charts);stats=[];}
 const sCols=Math.min(Math.max(stats.length,2),4);
 const cCols=charts.length===1?1:(charts.length===3&&charts.every(c=>c.viz==='bars'||c.viz==='stacked')?3:2);
 let body='';
 if(stats.length)body+=`<div class="grid${sCols}">${stats.map(c=>card(key,c)).join('')}</div>`;
 if(charts.length)body+=`<div class="grid${cCols}" style="align-items:start${stats.length?';margin-top:12px':''}">${charts.map(c=>card(key,c)).join('')}</div>`;
 return `<div class="sect ${s.cls}">
  <div class="sect-header"><span class="chip"><svg viewBox="0 0 16 16"><path d="${s.icon}"/></svg></span><span class="eyebrow">${s.title}</span><span class="info-dot">i</span></div>
  <p class="narrative">${narr}</p>
  ${body}
  ${srcLine?`<div class="src">Source: ${srcLine}</div>`:''}</div>`;}

const VULN_TXT={
 p:c=>`The selected area demonstrates a <b>${c.toLowerCase()}</b> level of physical vulnerability to climate hazards, based on the condition of infrastructure, buildings, critical facilities, and other physical assets exposed to climate-related hazards.`,
 e:c=>`The environmental conditions in the selected area are classified as having a <b>${c.toLowerCase()}</b> level of vulnerability to climate hazards, based on degradation of ecosystems, the loss of natural buffers, and the reduction in ecological resilience.`,
 ec:c=>`The selected area has a <b>${c.toLowerCase()}</b> level of economic vulnerability to climate hazards, based on the community's dependence on climate-sensitive livelihoods, household income stability, asset bases, and economic diversification.`,
 s:c=>`Communities in the selected area have a <b>${c.toLowerCase()}</b> level of social vulnerability to climate hazards, based on demographic and socio-economic characteristics that influence the ability to prepare for, respond to, and recover from climate-related impacts.`};
function vulnCard(title,txt,level){return `<div class="vcard"><div class="vt">${title}</div><div class="vd">${txt}</div>${gauge(level,title+': '+level)}<div class="vs">ADPC harmonised vulnerability indices</div></div>`;}

 const v=d.vuln;
 return `<div class="sect ${s.cls}">

   ${vulnCard('Physical Vulnerability',VULN_TXT.p(v.p),v.p)}

  </div>
  <div class="src">Source: WorldPop (Univ. of Southampton), R2025A v1, 2015–2030 &#183; ADPC harmonised vulnerability indices.</div></div>`;}

/* ============ render ============ */
const ORDER=['Indonesia','Malaysia','Singapore','Thailand','Philippines','Vietnam','Laos','Cambodia','Myanmar','Brunei Darussalam','Timor-Leste'];
const sel=document.getElementById('countrySel');
ORDER.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
function render(name){const d=C[name];
 document.getElementById('flag').textContent=d.flag;
 document.getElementById('app').innerHTML=demoSection(d.demo)+d.sections.join('');
 location.hash=encodeURIComponent(name);}
sel.addEventListener('change',()=>render(sel.value));
const init=decodeURIComponent((location.hash||'').replace('#',''));
sel.value=C[init]?init:'Indonesia';
render(sel.value);

/* ============ hover tooltip (delegated once — survives re-render) ============ */
const tip=document.createElement('div');tip.className='chart-tip';document.body.appendChild(tip);
const app=document.getElementById('app');
app.addEventListener('mousemove',e=>{
 const t=e.target.closest&&e.target.closest('[data-tip]');
 const txt=t&&(t.dataset?t.dataset.tip:t.getAttribute('data-tip'));
 if(txt){tip.textContent=txt;tip.classList.add('on');
  const x=Math.min(e.clientX+14,innerWidth-tip.offsetWidth-8);
  const y=Math.min(e.clientY+14,innerHeight-tip.offsetHeight-8);
  tip.style.left=x+'px';tip.style.top=y+'px';}
 else tip.classList.remove('on');});
app.addEventListener('mouseleave',()=>tip.classList.remove('on'));
</script>
