<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NbS Tool v3 — People Context (Panel Data Analyzer)</title>
<style>
  :root{
    --ink-900:#1B2A24;--ink-700:#374151;--ink-500:#6B7280;--ink-400:#9CA3AF;--line:#E7EBE9;
    --green:#0B5D3F;--green-50:#EAF4EF;--green-600:#12764F;
    --emp:#6D5BD0;--emp-50:#F0EEFB;--edu:#2F6FED;--edu-50:#EAF1FD;
    --eco:#E8912D;--eco-50:#FDF2E4;--hea:#D64550;--hea-50:#FCECED;
    --hou:#0E8C8C;--hou-50:#E5F4F4;
    --font:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --shadow:0 1px 3px rgba(16,24,40,.06),0 4px 16px rgba(16,24,40,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font);background:#F3F5F4;color:var(--ink-700);font-size:14px;line-height:1.55;}
  b,strong{color:var(--ink-900);font-weight:600;}
  .wrap{max-width:960px;margin:0 auto;padding:0 16px 60px;}
  .appbar{background:var(--green);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;}
  .appbar h1{font-size:16px;font-weight:700;}
  .country-pick{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:5px 8px 5px 14px;}
  .country-pick select{background:transparent;border:none;color:#fff;font-family:inherit;font-weight:600;font-size:13.5px;outline:none;cursor:pointer;}
  .country-pick select option{color:#111;}
  .stepper{background:var(--green-600);color:#DCEBE4;display:flex;gap:6px;flex-wrap:wrap;padding:10px 22px;font-size:12.5px;}
  .stepper .s{display:flex;align-items:center;gap:7px;opacity:.7;}
  .stepper .s.active{opacity:1;color:#fff;font-weight:600;}
  .stepper .n{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.25);display:grid;place-items:center;font-size:11px;font-weight:700;}
  .stepper .s.active .n{background:#fff;color:var(--green);}
  .stepper .sep{opacity:.4;}
  .subnav{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:26px;justify-content:center;padding:12px;font-size:14px;}
  .subnav a{text-decoration:none;color:var(--ink-500);font-weight:500;}
  .subnav a.active{color:var(--green);font-weight:700;border-bottom:2.5px solid var(--green);padding-bottom:10px;}
  .pagehead{text-align:center;padding:20px 0 6px;}
  .pagehead h2{font-size:20px;font-weight:700;color:var(--ink-900);}
  .pagehead .rule{width:120px;height:3px;margin:8px auto 0;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--eco),var(--edu));}
  .coverage{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px;margin:16px 0;}
  .coverage .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--ink-500);text-transform:uppercase;margin-bottom:6px;}
  .coverage .desc{font-size:12.5px;color:var(--ink-500);margin-bottom:14px;}
  .cov-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .cov{border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;}
  .cov.on{border-color:var(--green);background:var(--green-50);}
  .cov .t{font-weight:700;color:var(--ink-900);font-size:13.5px;}
  .cov .s{font-size:11.5px;color:var(--ink-500);margin-top:3px;}

  .sec{background:#fff;border-radius:16px;box-shadow:var(--shadow);margin:16px 0;overflow:hidden;border:1px solid var(--line);}
  .sec-head{display:flex;align-items:center;gap:9px;padding:14px 20px;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase;}
  .sec-head .ico{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:14px;}
  .sec-head .info{margin-left:auto;width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:grid;place-items:center;font-size:11px;font-style:italic;opacity:.6;}
  .sec-body{padding:14px 20px 20px;}
  .narr{background:#F8FAF9;border:1px solid var(--line);border-left:3px solid var(--green);border-radius:10px;padding:11px 14px;font-size:12.8px;color:var(--ink-700);margin-bottom:14px;}
  .narr .nl{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-400);display:block;margin-bottom:4px;}

  .grid{display:grid;gap:12px;}
  .g2{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:repeat(3,1fr);}.g4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:720px){.g2,.g3,.g4,.cov-opts{grid-template-columns:1fr;}}

  .card{border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;flex-direction:column;}
  .card .ct{font-size:12px;font-weight:700;color:var(--ink-900);display:flex;align-items:center;gap:6px;}
  .card .cu{font-size:10.5px;color:var(--ink-400);margin-top:1px;}
  .card .cbody{flex:1;margin:10px 0 8px;display:flex;flex-direction:column;justify-content:center;}
  .card .big{font-size:24px;font-weight:800;color:var(--ink-900);}
  .card .big.pct{color:var(--accent,#0B5D3F);}
  .card .cf{font-size:9.5px;color:var(--ink-400);border-top:1px dashed var(--line);padding-top:7px;margin-top:auto;line-height:1.35;}
  .chip{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:7px;font-size:13px;}

  .ranked{list-style:none;}
  .ranked li{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12.5px;}
  .ranked li:last-child{border-bottom:none;}
  .ranked .rk{width:20px;height:20px;border-radius:6px;font-weight:700;display:grid;place-items:center;font-size:11px;flex:none;}
  .ranked .nm{flex:1;color:var(--ink-900);}.ranked .vl{font-weight:600;}
  .tag{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:999px;}
  .tag.cont{background:#FDE8E8;color:#C0392B;}.tag.non{background:#E6F4EA;color:#1E7E4B;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;font-size:11px;color:var(--ink-500);margin-top:8px;}
  .legend .li{display:flex;align-items:center;gap:5px;}.legend .sw{width:10px;height:10px;border-radius:3px;}
  .barrow{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:11.5px;}
  .barrow .bn{width:130px;color:var(--ink-700);}
  .barrow .bt2{flex:1;height:9px;border-radius:5px;background:#EEF1F0;overflow:hidden;display:block;}
  .barrow .bf{display:block;height:100%;border-radius:5px;}
  .barrow .bv{width:52px;text-align:right;font-weight:600;color:var(--ink-900);}
  .vt{font-weight:700;color:var(--ink-900);font-size:12.5px;}
  .vd{font-size:11px;color:var(--ink-500);margin:2px 0 20px;}
  .gauge{position:relative;height:11px;border-radius:6px;background:linear-gradient(90deg,#1E9E5A,#8FD14F,#F4D03F,#EB984E,#E1523D);}
  .gauge .mk{position:absolute;top:-4px;width:3px;height:19px;background:#111;border-radius:2px;transform:translateX(-50%);}
  .gauge-lab{position:absolute;top:-26px;transform:translateX(-50%);background:#111;color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;}
  .gscale{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-400);margin-top:5px;}
  .disc{background:#FCF3E4;border:1px solid #F0DDBB;border-radius:10px;padding:11px 13px;font-size:11.5px;color:#8A6D2F;margin-top:14px;}
  .footbtns{display:flex;gap:12px;margin-top:20px;}
  .footbtns button{flex:1;border-radius:12px;padding:14px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;border:1px solid var(--green);}
  .btn-out{background:#fff;color:var(--green);}.btn-fill{background:var(--green);color:#fff;border:none;}
</style>
</head>
<body>
  <div class="appbar"><h1>Data Analyser</h1>
    <div class="country-pick"><span id="flag">🇮🇩</span><select id="countrySel" onchange="render(this.value)"></select></div>
  </div>
  <div class="stepper">
    <span class="s"><span class="n">✓</span> Select Location</span><span class="sep">···</span>
    <span class="s active"><span class="n">2</span> Site Characterisation</span><span class="sep">···</span>
    <span class="s"><span class="n">3</span> Threat Profile</span><span class="sep">···</span>
    <span class="s"><span class="n">4</span> Select Intervention</span><span class="sep">···</span>
    <span class="s"><span class="n">5</span> Potential Benefit</span>
  </div>
  <div class="subnav"><a href="#">General Context</a><a href="#">Nature Context</a><a href="#" class="active">People Context</a><a href="#">Climate Context</a></div>
  <div class="wrap">
    <div class="pagehead"><h2>Site Characterisation: People Context</h2><div class="rule"></div></div>
    <div id="app"></div>
    <div class="footbtns"><button class="btn-out">↻ Reselect Area</button><button class="btn-fill">Select Intervention Type »</button></div>
  </div>
<script>
/* ---------------- chart builders ---------------- */
function donut(segs,center,size){size=size||130;const tot=segs.reduce((a,s)=>a+s.val,0)||1;let a=-Math.PI/2;const R=size*0.4,r=size*0.24,cx=size/2,cy=size/2;let p='';
 segs.forEach(s=>{const ang=s.val/tot*2*Math.PI,a2=a+ang;const x1=cx+R*Math.cos(a),y1=cy+R*Math.sin(a),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2),xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2),xi1=cx+r*Math.cos(a),yi1=cy+r*Math.sin(a),big=ang>Math.PI?1:0;
  p+=`<path d="M${x1} ${y1} A${R} ${R} 0 ${big} 1 ${x2} ${y2} L${xi2} ${yi2} A${r} ${r} 0 ${big} 0 ${xi1} ${yi1} Z" fill="${s.color}"/>`;a=a2;});
 const c=center?`<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="8" fill="#6B7280">${center.top||''}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="13" font-weight="700" fill="#1B2A24">${center.mid||''}</text>`:'';
 return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${p}${c}</svg>`;}
function pyramid(rows,bands){const max=Math.max(...rows.flatMap(r=>[r.male,r.female]))||1;const W=300,H=210,cx=W/2,bh=H/rows.length-2,gap=9;
 const col=i=>{const a=rows[i].age;const n=parseInt(a);if(a.includes('45')||n>=45)return bands[2];if(n>=15)return bands[1];return bands[0];};let s='';
 rows.forEach((r,i)=>{const y=i*(bh+2);const lw=(r.male/max)*(cx-gap),rw=(r.female/max)*(cx-gap);
  s+=`<rect x="${cx-gap-lw}" y="${y}" width="${lw}" height="${bh}" fill="${col(i)}" rx="1.5"/><rect x="${cx+gap}" y="${y}" width="${rw}" height="${bh}" fill="${col(i)}" opacity=".62" rx="1.5"/><text x="${cx}" y="${y+bh-1}" text-anchor="middle" font-size="7" fill="#6B7280">${r.age}</text>`;});
 s+=`<text x="${gap}" y="${H+2}" font-size="8.5" fill="#6B7280">Male</text><text x="${W-gap}" y="${H+2}" text-anchor="end" font-size="8.5" fill="#6B7280">Female</text>`;
 return `<svg viewBox="0 0 ${W} ${H+8}" width="100%">${s}</svg>`;}
function stackedBar(segs){const tot=segs.reduce((a,s)=>a+s.val,0)||1;let x=0,s='';segs.forEach(g=>{const w=g.val/tot*100;s+=`<rect x="${x}" y="0" width="${w}" height="26" fill="${g.color}"/><text x="${x+w/2}" y="17" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">${Math.round(w)}%</text>`;x+=w;});return `<svg viewBox="0 0 100 26" width="100%" height="26" preserveAspectRatio="none" style="border-radius:6px">${s}</svg>`;}
function bars(items,color){const max=Math.max(...items.map(i=>i.val))||1;const W=Math.max(200,items.length*44),bw=W/items.length*0.5;let s='';
 items.forEach((it,i)=>{const h=(it.val/max)*84;const x=i*(W/items.length)+(W/items.length-bw)/2,y=96-h;s+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="3" fill="${color}"/><text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1B2A24">${it.val}${it.suf||''}</text><text x="${x+bw/2}" y="112" text-anchor="middle" font-size="7.5" fill="#6B7280">${it.label}</text>`;});
 return `<svg viewBox="0 0 ${W} 118" width="100%">${s}</svg>`;}
function line(series,color){const W=280,H=84,pad=6,ys=series.map(p=>p.y),mn=Math.min(...ys),mx=Math.max(...ys)||1;
 const pts=series.map((p,i)=>[pad+i/(series.length-1)*(W-2*pad),H-pad-((p.y-mn)/((mx-mn)||1))*(H-2*pad)]);
 const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="84"><path d="${d} L${W-pad} ${H-pad} L${pad} ${H-pad} Z" fill="${color}22"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.3" fill="${color}"/>`).join('')}</svg>`;}
function gaugeHtml(level){const m={'Very Low':8,'Low':30,'Moderate':50,'High':72,'Very High':92},pos=m[level]??50;return `<div class="gauge"><div class="gauge-lab" style="left:${pos}%">${level}</div><div class="mk" style="left:${pos}%"></div></div><div class="gscale"><span>Very Low</span><span>Very High</span></div>`;}
function barRow(n,pct,color,val){return `<div class="barrow"><span class="bn">${n}</span><span class="bt2"><span class="bf" style="width:${Math.min(pct,100)}%;background:${color}"></span></span><span class="bv">${val}</span></div>`;}

/* ---------------- card factory ---------------- */
function card(accent,c){
 const src=(c.src||'').replace(/^[^·]*\.csv\s*·\s*/,'').trim();
 const foot=`<div class="cf">${[src,c.years].filter(Boolean).join(' · ')}</div>`;
 let body='';
 switch(c.viz){
  case 'bignumber': body=`<div class="big">${c.value}</div>`;break;
  case 'kpi': case 'iconstat': body=`<div class="big">${c.value}</div>`;break;
  case 'statpct': body=`<div class="big pct" style="--accent:${accent}">${c.value}</div>`;break;
  case 'ranked': body=`<ul class="ranked">${c.items.map((it,i)=>`<li><span class="rk" style="background:${accent}1A;color:${accent}">${i+1}</span><span class="nm">${it.n}</span>${it.tag?`<span class="tag ${it.tag}">${it.tag==='cont'?'Contagious':'Non-Cont.'}</span>`:`<span class="vl">${it.v||''}</span>`}</li>`).join('')}</ul>`;break;
  case 'stackedbar': body=`${stackedBar(c.segs)}<div class="legend">${c.segs.map(s=>`<span class="li"><span class="sw" style="background:${s.color}"></span>${s.label}</span>`).join('')}</div>`;break;
  case 'donut': body=`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center">${donut(c.segs.map(s=>({val:s.val,color:s.color})),{top:c.segs[0].label.split(' ')[0],mid:c.segs[0].val+'%'},120)}<div style="font-size:11px">${c.segs.map(s=>`<div style="display:flex;align-items:center;gap:6px;margin:2px 0"><span class="sw" style="width:9px;height:9px;border-radius:3px;background:${s.color}"></span>${s.label} <b style="margin-left:auto">${s.val}%</b></div>`).join('')}</div></div>`;break;
  case 'line': case 'trend': body=line(c.series,accent);break;
  case 'groupedbar': body=bars(c.items,accent);break;
  case 'pictogram': body=c.items.map(it=>barRow(it.n,it.v,accent,it.v+'%')).join('');break;
  case 'agesex': body=`${pyramid(c.rows,['#7FC0A6','#2E8B67','#0B5D3F'])}<div class="legend"><span class="li"><span class="sw" style="background:#7FC0A6"></span>0–14</span><span class="li"><span class="sw" style="background:#2E8B67"></span>15–44</span><span class="li"><span class="sw" style="background:#0B5D3F"></span>45–90+</span></div>`;break;
 }
 return `<div class="card" style="--accent:${accent}"><div class="ct">${c.t}</div>${c.unit?`<div class="cu">${c.unit}</div>`:''}<div class="cbody">${body}</div>${foot}</div>`;
}
function vulnCard(t,desc,lvl){return `<div class="card"><div class="vt">${t}</div><div class="vd">${desc}</div>${gaugeHtml(lvl)}<div class="cf" style="margin-top:10px">ADPC harmonised vulnerability indices</div></div>`;}

/* ---------------- SECTION META ---------------- */
const SEC={demography:{c:'#0B5D3F',bg:'var(--green-50)',ico:'👥',t:'Social (Demography)'},
 employment:{c:'#6D5BD0',bg:'var(--emp-50)',ico:'💼',t:'Employment'},
 education:{c:'#2F6FED',bg:'var(--edu-50)',ico:'🎓',t:'Education'},
 economy:{c:'#E8912D',bg:'var(--eco-50)',ico:'💰',t:'Economy'},
 health:{c:'#D64550',bg:'var(--hea-50)',ico:'➕',t:'Health'},
 housing:{c:'#0E8C8C',bg:'var(--hou-50)',ico:'💧',t:'Housing & Human Settlements'}};

/* regional demography block builder (same layers for every country) */
function demoSection(d){
 const s=SEC.demography;
 const pop=card('#0B5D3F',{t:'Estimated Populations',viz:'bignumber',value:d.pop,unit:'people (Male '+d.male+' · Female '+d.female+')',gran:'~100 m grid',src:'WorldPop (constrained 2015–2030, R2025A v1)'});
 const age=card('#0B5D3F',{t:'Estimated Age Group',viz:'agesex',rows:d.agesex,unit:'male & female by age group',gran:'~100 m grid',src:'WorldPop age–sex breakdown, R2025A v1'});
 const v=d.vuln;
 return `<div class="sec">${head(s)}<div class="sec-body">
   <div class="narr"><span class="nl">Narrative — Demography (regional layers)</span>Based on gridded world population data, the selected area has an estimated total population of <b>${d.pop}</b>, comprising of <b>${d.male}</b> males and <b>${d.female}</b> females. Vulnerability to climate hazards is scored from Very Low to Very High from ADPC harmonised indices.</div>
   <div class="grid g2">${pop}${age}</div>
   <div class="grid g2" style="margin-top:12px">
     ${vulnCard('Physical Vulnerability','The selected area demonstrates a '+v.p.toLowerCase()+' level of physical vulnerability to climate hazards.',v.p)}
     ${vulnCard('Environmental Vulnerability','Environmental conditions are classified as '+v.e.toLowerCase()+' vulnerability to climate hazards.',v.e)}
     ${vulnCard('Economic Vulnerability','The selected area has a '+v.ec.toLowerCase()+' level of economic vulnerability to climate hazards.',v.ec)}
     ${vulnCard('Social Vulnerability','Communities have a '+v.s.toLowerCase()+' level of social vulnerability to climate hazards.',v.s)}
   </div></div></div>`;
}
function head(s){return `<div class="sec-head" style="background:${s.bg};color:${s.c}"><span class="ico" style="background:${s.c}">${s.ico}</span>${s.t}<span class="info">i</span></div>`;}
function section(key,narr,cards,cols){const s=SEC[key];
 return `<div class="sec">${head(s)}<div class="sec-body"><div class="narr"><span class="nl">Narrative — ${s.t}</span>${narr}</div>
  <div class="grid g${cols||2}">${cards.map(c=>card(s.c,c)).join('')}</div></div></div>`;}

/* ---------------- PER-COUNTRY SPEC DATA ---------------- */
/* Each country lists ONLY the indicators available per the Go/No-go spec. Values are illustrative samples. */
const DEMO_DEFAULT=[{age:'0-4',male:14,female:13},{age:'5-9',male:15,female:14},{age:'10-14',male:14,female:13},{age:'15-19',male:13,female:12},{age:'20-24',male:12,female:12},{age:'25-29',male:11,female:11},{age:'30-34',male:10,female:10},{age:'35-39',male:9,female:9},{age:'40-44',male:8,female:8},{age:'45-49',male:6,female:6},{age:'50-54',male:5,female:5},{age:'55-90+',male:4,female:5}];

const C={};

C.Indonesia={flag:'🇮🇩',cur:'Rp (IDR)',
 demo:{pop:'252,400',male:'127,500',female:'124,900',agesex:DEMO_DEFAULT,vuln:{p:'Moderate',e:'Very Low',ec:'Moderate',s:'Very High'}},
 build(){return demoSection(this.demo)
 +section('employment',`In <b>West Kalimantan</b> Province, the unemployment rate is <b>5.2%</b> of the labour force; the employment rate is <b>94.8%</b> of the working-age population aged 15+; the underemployment rate is <b>8.7%</b>; the top three industries are Agriculture & Fishing, Wholesale & Retail, and Manufacturing; and employment is split 54% agriculture, 26% industry, 20% services (as of 2024).`,
  [{t:'Unemployment Rate',viz:'statpct',value:'5.2%',unit:'% of labour force',gran:'adm1 (province/state)',src:'demographic_unemployment_rate_open.csv · BPS',years:'2016–2024'},
   {t:'Employment Rate',viz:'statpct',value:'94.8%',unit:'% of community',gran:'adm1 (province/state)',src:'demographic_employment_status.csv · BPS',years:'2017–2024'},

/* ---------------- render ---------------- */
const ORDER=['Indonesia','Malaysia','Singapore','Thailand','Philippines','Vietnam','Laos','Cambodia','Myanmar','Brunei','Timor-Leste'];
function render(name){const d=C[name];document.getElementById('flag').textContent=d.flag;document.getElementById('app').innerHTML=d.build();}
const sel=document.getElementById('countrySel');
ORDER.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
const initC=decodeURIComponent((location.hash||'').replace('#',''));
const start=C[initC]?initC:'Indonesia';
sel.value=start;render(start);
